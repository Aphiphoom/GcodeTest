<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>เข้าสู่ระบบ · DXF → G-Code Generator</title>
<link rel="stylesheet" href="styles.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
  .auth-shell { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--steel-900); }
  .auth-card { width: 360px; background: var(--steel-800); border: 1px solid var(--line); border-radius: 12px; padding: 32px 28px; }
  .auth-card .brand-mark { font-size: 34px; color: var(--amber); display: block; margin-bottom: 6px; text-align: center; }
  .auth-card .brand-mark.brand-logo { width: 52px; height: 52px; padding: 6px; margin: 0 auto 14px; }
  .auth-card h1 { font-size: 16px; letter-spacing: .04em; margin: 0 0 4px; text-align: center; }
  .auth-card p.sub { color: var(--ink-dim); font-size: 12px; margin: 0 0 22px; text-align: center; }
  .auth-card .fld { margin-bottom: 12px; }
  .auth-tabs { display: flex; gap: 4px; margin-bottom: 18px; background: var(--steel-700); border-radius: 7px; padding: 3px; }
  .auth-tabs button { flex: 1; padding: 8px; border: none; background: transparent; color: var(--ink-dim); border-radius: 5px; font-size: 12px; font-weight: 600; cursor: pointer; }
  .auth-tabs button.active { background: var(--amber); color: #1a1206; }
  .auth-card .btn { width: 100%; justify-content: center; padding: 11px; margin-top: 6px; }
  #authStatus { font-size: 12px; color: var(--ink-faint); margin-top: 14px; min-height: 16px; text-align: center; line-height: 1.6; }
  #authStatus.err { color: var(--red); }
  #authStatus.ok { color: var(--green); }
  .auth-extra { text-align: center; margin-top: 4px; }
  .auth-extra a { font-size: 12px; color: var(--cyan); text-decoration: none; cursor: pointer; }
  .auth-extra a:hover { text-decoration: underline; }
</style>
</head>

    <h1>DXF → G-CODE GENERATOR</h1>
    <p class="sub">เข้าสู่ระบบเพื่อใช้งานโปรแกรม</p>

    <div class="auth-tabs">
      <button id="tabLogin" class="active">เข้าสู่ระบบ</button>
      <button id="tabSignup">สมัครสมาชิกใหม่</button>
    </div>

    <form id="authForm">
      <label class="fld" id="fldEmail"><span>อีเมล</span><input type="email" id="email" required></label>
      <label class="fld" id="fldPassword"><span id="lblPassword">รหัสผ่าน</span><input type="password" id="password" required minlength="6"></label>
      <label class="fld" id="fldPassword2" style="display:none"><span>ยืนยันรหัสผ่านใหม่</span><input type="password" id="password2" minlength="6"></label>
      <button type="submit" id="btnSubmit" class="btn btn-accent">เข้าสู่ระบบ</button>
    </form>

    <p class="auth-extra" id="linkForgotWrap"><a id="linkForgot">ลืมรหัสผ่าน?</a></p>
    <p class="auth-extra" id="linkBackWrap" style="display:none"><a id="linkBack">← กลับไปเข้าสู่ระบบ</a></p>

    <div id="authStatus"></div>
  </div>
</div>

<script src="config.js"></script>
<script>
  const sb = window.supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY);
  const params = new URLSearchParams(location.search);
  const next = params.get('next') || 'index.html';
  // Supabase ส่งกลับมาที่หน้านี้พร้อม #access_token=...&type=recovery ตอนผู้ใช้กดลิงก์เปลี่ยนรหัสผ่านในอีเมล
  const isRecoveryLink = location.hash.includes('type=recovery');

  let mode = 'login'; // 'login' | 'signup' | 'forgot' | 'reset'
  const tabLogin = document.getElementById('tabLogin');
  const tabSignup = document.getElementById('tabSignup');
  const authTabs = document.querySelector('.auth-tabs');
  const btnSubmit = document.getElementById('btnSubmit');
  const statusEl = document.getElementById('authStatus');
  const fldEmail = document.getElementById('fldEmail');
  const fldPassword = document.getElementById('fldPassword');
  const fldPassword2 = document.getElementById('fldPassword2');
  const lblPassword = document.getElementById('lblPassword');
  const emailInput = document.getElementById('email');
  const passwordInput = document.getElementById('password');
  const password2Input = document.getElementById('password2');
  const linkForgotWrap = document.getElementById('linkForgotWrap');
  const linkBackWrap = document.getElementById('linkBackWrap');

  function setMode(m) {
    mode = m;
    tabLogin.classList.toggle('active', m === 'login');
    tabSignup.classList.toggle('active', m === 'signup');
    statusEl.textContent = ''; statusEl.className = '';

    authTabs.style.display = (m === 'login' || m === 'signup') ? '' : 'none';
    linkForgotWrap.style.display = (m === 'login') ? '' : 'none';
    linkBackWrap.style.display = (m === 'forgot' || m === 'reset') ? '' : 'none';

    fldEmail.style.display = (m === 'reset') ? 'none' : '';
    emailInput.required = (m !== 'reset');

    fldPassword.style.display = (m === 'forgot') ? 'none' : '';
    passwordInput.required = (m !== 'forgot');
    fldPassword2.style.display = (m === 'reset') ? '' : 'none';
    password2Input.required = (m === 'reset');
    lblPassword.textContent = (m === 'reset') ? 'รหัสผ่านใหม่' : 'รหัสผ่าน';

    btnSubmit.textContent = {
      login: 'เข้าสู่ระบบ', signup: 'สมัครสมาชิก',
      forgot: 'ส่งลิงก์เปลี่ยนรหัสผ่าน', reset: 'บันทึกรหัสผ่านใหม่'
    }[m];
  }
  tabLogin.addEventListener('click', () => setMode('login'));
  tabSignup.addEventListener('click', () => setMode('signup'));
  document.getElementById('linkForgot').addEventListener('click', (e) => { e.preventDefault(); setMode('forgot'); });
  document.getElementById('linkBack').addEventListener('click', (e) => {
    e.preventDefault();
    if (isRecoveryLink) sb.auth.signOut(); // ตัด session ชั่วคราวจากลิงก์รีเซ็ต กันสับสนกับการ login จริง
    setMode('login');
  });

  if (isRecoveryLink) {
    // มาจากลิงก์เปลี่ยนรหัสผ่านในอีเมล — ห้ามเด้งเข้าโปรแกรมทันที ให้กรอกรหัสผ่านใหม่ก่อน
    setMode('reset');
  } else {
    setMode('login');
    // ถ้า login ค้างอยู่แล้ว (ไม่ใช่กรณีลิงก์รีเซ็ต) เด้งเข้าโปรแกรมทันที
    sb.auth.getUser().then(({ data }) => { if (data && data.user) location.href = next; });
  }

  document.getElementById('authForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = emailInput.value.trim();
    const password = passwordInput.value;
    btnSubmit.disabled = true;
    statusEl.textContent = 'กำลังดำเนินการ...'; statusEl.className = '';

    try {
      if (mode === 'signup') {
        const redirectTo = location.origin + location.pathname; // ชี้กลับมาที่หน้านี้ตรง ๆ ไม่พึ่ง Site URL ของ dashboard
        const { error } = await sb.auth.signUp({ email, password, options: { emailRedirectTo: redirectTo } });
        if (error) throw error;
        statusEl.textContent = 'สมัครสำเร็จ — กรุณาตรวจสอบอีเมลและกดลิงก์ยืนยันก่อนเข้าใช้งาน';
        statusEl.className = 'ok';
      } else if (mode === 'forgot') {
        const redirectTo = location.origin + location.pathname;
        const { error } = await sb.auth.resetPasswordForEmail(email, { redirectTo });
        if (error) throw error;
        statusEl.textContent = 'ส่งลิงก์เปลี่ยนรหัสผ่านไปที่อีเมลแล้ว — กรุณาตรวจสอบอีเมล (รวมถึงถังเมล Junk/Spam)';
        statusEl.className = 'ok';
      } else if (mode === 'reset') {
        if (password !== password2Input.value) throw new Error('รหัสผ่านใหม่ทั้งสองช่องไม่ตรงกัน');
        const { error } = await sb.auth.updateUser({ password });
        if (error) throw error;
        await sb.auth.signOut(); // บังคับ login ใหม่ด้วยรหัสผ่านใหม่ ตัด session ชั่วคราวจากลิงก์ทิ้ง
        statusEl.textContent = 'เปลี่ยนรหัสผ่านสำเร็จ — กรุณาเข้าสู่ระบบด้วยรหัสผ่านใหม่';
        statusEl.className = 'ok';
        history.replaceState(null, '', location.pathname + location.search); // ล้าง #access_token ออกจาก URL
        setTimeout(() => setMode('login'), 800);
      } else {
        const { error } = await sb.auth.signInWithPassword({ email, password });
        if (error) throw error;
        statusEl.textContent = 'เข้าสู่ระบบสำเร็จ กำลังพาไปยังโปรแกรม...';
        statusEl.className = 'ok';
        setTimeout(() => { location.href = next; }, 500);
      }
    } catch (err) {
      statusEl.textContent = 'เกิดข้อผิดพลาด: ' + (err.message || 'ไม่สำเร็จ');
      statusEl.className = 'err';
    } finally {
      btnSubmit.disabled = false;
    }
  });
</script>
</body>
</html>
